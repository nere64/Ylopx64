// ==================== LÓGICA DE LA APP ====================
let currentMonthIndex = 0;
let chartInstance = null;
let audioCtx = null;
let alarmInterval = null;

function formatFechaChilena(date) {
    return `${date.getDate().toString().padStart(2,'0')}/${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getFullYear()}`;
}

function getCurrentMonthIndex() {
    const now = new Date();
    for (let i = 0; i < MESES.length; i++) {
        const inicio = new Date(MESES[i].fechaInicio);
        const fin = new Date(MESES[i].fechaFin);
        if (now >= inicio && now <= fin) return i;
    }
    return 0;
}

function getCurrentActivity(horario) {
    const now = new Date();
    const currentMinutes = now.getHours() * 60 + now.getMinutes();
    for (let row of horario) {
        let [h, m] = row.hora.split(":").map(Number);
        let activityStart = h * 60 + m;
        let duration = parseInt(row.duracion) || 0;
        if (currentMinutes >= activityStart && currentMinutes < activityStart + duration) {
            return { actividad: row.actividad, inicio: row.hora };
        }
    }
    return null;
}

function playLoudBeep() {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'square';
        osc.frequency.value = 880;
        gain.gain.value = 0.35;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
        osc.stop(audioCtx.currentTime + 0.5);
        audioCtx.resume();
    } catch(e) { console.warn("Audio no disponible"); }
}

function sendNotification(title, body) {
    playLoudBeep();
    if (Notification.permission === 'granted') {
        new Notification(title, { body });
    } else if (Notification.permission !== 'denied') {
        Notification.requestPermission();
    }
}

function startAlarmSystem(horario) {
    if (alarmInterval) clearInterval(alarmInterval);
    alarmInterval = setInterval(() => {
        const now = new Date();
        const currentTime = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        const actividadAhora = horario.find(row => row.hora === currentTime);
        if (actividadAhora) {
            sendNotification(`🔔 RitmoLab`, `⏰ Es hora de: ${actividadAhora.actividad}`);
        }
        const habitoAhora = HABITOS.find(h => h.hora === currentTime);
        if (habitoAhora) {
            sendNotification(`⏰ Recordatorio`, `${habitoAhora.nombre}`);
        }
    }, 60000);
}

function renderDonut(horario) {
    const canvas = document.getElementById('donutChart');
    if (!canvas) return;
    let activitySum = new Map();
    horario.forEach(row => {
        let act = row.actividad.split('(')[0].trim();
        let dur = parseInt(row.duracion) || 0;
        activitySum.set(act, (activitySum.get(act) || 0) + dur);
    });
    let labels = [], data = [], bgColors = [];
    const colorMap = {
        "Levantar + ordenar + higiene": "#E8D5CC", "Desayuno + lavar dientes": "#F5E8C7",
        "ESTUDIO CLASES": "#C7D9C5", "BLENDER": "#B8D4E3", "EJERCICIO": "#E2C2B3",
        "Tiempo libre": "#D6D6D6", "Almuerzo + lavar dientes": "#F0D9B5",
        "Once + lavar dientes": "#D9C5B3", "Preparar dormir + lavar dientes": "#C5D6D9", "Dormir": "#B3C4C4"
    };
    for (let [act, mins] of activitySum) {
        if (mins / 1440 < 0.02) continue;
        labels.push(act.length > 20 ? act.slice(0,18)+"..." : act);
        data.push(mins);
        bgColors.push(colorMap[act] || `hsl(${(act.length * 43) % 360}, 65%, 78%)`);
    }
    if (chartInstance) chartInstance.destroy();
    const ctx = canvas.getContext('2d');
    chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: bgColors, cutout: '68%', borderWidth: 0 }] },
        options: { plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${(ctx.raw/60).toFixed(1)}h` } } }, responsive: true }
    });
}

function renderCalendar(mes) {
    const inicio = new Date(mes.fechaInicio);
    const fin = new Date(mes.fechaFin);
    const year = inicio.getFullYear();
    const month = inicio.getMonth();
    const startDay = inicio.getDate();
    const endDay = fin.getDate();
    const firstDayOfMonth = new Date(year, month, 1);
    const startWeekday = firstDayOfMonth.getDay();
    const today = new Date();
    const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
    const ideas = mes.ideas || {};
    
    let html = `<div class="month-title">📅 ${mes.nombre}</div>`;
    html += `<div class="calendar-grid">`;
    const diasSemana = ['Do', 'Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sa'];
    diasSemana.forEach(d => html += `<div style="text-align:center;font-weight:bold; font-size:0.7rem; padding:4px;">${d}</div>`);
    
    for (let i = 0; i < startWeekday; i++) html += `<div class="calendar-day empty"></div>`;
    
    for (let d = 1; d <= endDay; d++) {
        const isInRange = d >= startDay;
        const isToday = isCurrentMonth && today.getDate() === d && isInRange;
        const idea = ideas[d];
        
        if (!isInRange && d < startDay) {
            html += `<div class="calendar-day empty" style="opacity:0.3;">${d}</div>`;
        } else {
            html += `<div class="calendar-day ${idea ? 'has-idea' : ''} ${isToday ? 'today' : ''}">
                        <strong>${d}</strong>
                        ${idea ? `<span class="idea-badge">${idea.length > 30 ? idea.substring(0, 27)+'...' : idea}</span>` : ''}
                    </div>`;
        }
    }
    html += `</div>`;
    return html;
}

        </div>

                <div class="info-badge"><strong>📅 Período</strong><span>${formatFechaChilena(new Date(mes.fechaInicio))} - ${formatFechaChilena(new Date(mes.fechaFin))}</span></div>
                <div class="info-badge"><strong>💪 Ejercicio</strong><span>${mes.tipo === 'nocturno' ? "Mar, Jue, Sáb 17:00" : "Mar, Jue 17:00"}</span></div>
                <div class="info-badge"><strong>🎨 Blender</strong><span>${mes.tipo === 'nocturno' ? "Lun/Mie/Vie 15h · Mar/Jue/Sab/Dom 18:30h" : "Lun/Vie 11h · Mie/Dom 15h"}</span></div>
                <div class="info-badge"><strong>📚 Clases</strong><span>${mes.tipo === 'nocturno' ? "12:00 - 14:00" : "09:00 - 11:00"}</span></div>
            </div>
        </div>
        
        <div class="info-card">
            <div class="card-header"><i class="fas fa-table-list"></i> Horario Diario</div>
            <div style="overflow-x:auto;">
                <table class="horario-table">
                    <thead><tr><th>Hora</th><th>Actividad</th><th>Duración</th></tr></thead>
                    <tbody>
                        ${mes.horario.map(row => `<tr><td style="font-weight:500;">${row.hora}</td><td>${row.actividad}</td><td>${row.duracion} min</td>`).join('')}
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="info-card">
            <div class="card-header"><i class="fas fa-chart-pie"></i> Distribución del día</div>
            <div class="donut-wrapper"><canvas id="donutChart" width="240" height="240"></canvas></div>
        </div>
        
        <div class="info-card">
            <div class="card-header"><i class="fab fa-youtube"></i> Calendario de Contenido · Ideas</div>
            ${renderCalendar(mes)}
            <div style="margin-top:12px; font-size:0.7rem; color:#B8A48A;"><i class="fas fa-lightbulb"></i> Días con ideas: fondo color crema (Shorts días 1,3,5,7,9,11,13 · Largo día 28)</div>
        </div>
    `;
    
    renderDonut(mes.horario);
    startAlarmSystem(mes.horario);
}

function buildSidebar() {
    const container = document.getElementById('periodList');
    if (!container) return;
    container.innerHTML = '';
    MESES.forEach((mes, idx) => {
        const div = document.createElement('div');
        div.className = `period-item ${idx === currentMonthIndex ? 'active' : ''}`;
        div.innerHTML = `<i class="fas ${mes.tipo === 'nocturno' ? 'fa-moon' : 'fa-sun'}"></i><span>${mes.nombre}</span>`;
        div.addEventListener('click', () => {
            currentMonthIndex = idx;
            buildSidebar();
            renderPeriodView(idx);
        });
        container.appendChild(div);
    });
}

function updateClock() {
    const clockEl = document.getElementById('liveClock');
    if (clockEl) {
        const now = new Date();
        clockEl.innerHTML = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    requestAnimationFrame(() => setTimeout(updateClock, 1000));
}
